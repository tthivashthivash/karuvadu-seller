<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Mini Meesho</title>
<style>
body{font-family:Arial; margin:0; padding:0; background:linear-gradient(120deg,#fef9f9,#e0f7fa); animation:gradientBG 15s ease infinite; background-size:400% 400%;}
.container{max-width:400px; margin:50px auto; background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2); text-align:center;}
h2{margin-bottom:20px; color:#333;}
.input-group{margin-bottom:15px; text-align:left;}
.input-group label{display:block; margin-bottom:5px; color:#555;}
.input-group input{width:100%; padding:10px 12px; border-radius:10px; border:2px solid #ddd; outline:none; transition:0.3s;}
.input-group input:focus{border-color:violet;}
button{padding:12px 25px; border:none; border-radius:10px; background:linear-gradient(135deg,violet,skyblue); color:white; font-size:16px; font-weight:bold; cursor:pointer; transition:0.3s;}
button:hover{transform:scale(1.05); box-shadow:0 5px 15px rgba(0,0,0,0.2);}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
</style>
</head>
<body>
<div class="container">
<h2>Admin Panel</h2>
<form id="admin-form">
<div class="input-group">
<label for="name">Product Name</label>
<input type="text" id="name" required>
</div>
<div class="input-group">
<label for="price">Price</label>
<input type="text" id="price" required>
</div>
<div class="input-group">
<label for="details">Details</label>
<input type="text" id="details" required>
</div>
<div class="input-group">
<label for="img">Image URL</label>
<input type="text" id="img" required>
</div>
<button type="submit">Add Product</button>
</form>
</div>

<script>
// Redirect if not logged in
if(!localStorage.getItem('loggedIn')){
    alert("Please login first!");
    window.location.href="login.html";
}

document.getElementById('admin-form').addEventListener('submit',(e)=>{
    e.preventDefault();
    let products = JSON.parse(localStorage.getItem('products')) || [];
    const newProd={
        name:document.getElementById('name').value,
        price:document.getElementById('price').value,
        details:document.getElementById('details').value,
        img:document.getElementById('img').value
    };
    products.push(newProd);
    localStorage.setItem('products',JSON.stringify(products));
    alert('Product added!');
    e.target.reset();
});
</script>
</body>
</html>
