<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist | Developer Mode</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0; padding:0;
    background:#f0f4f8;
  }

  header {
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding:15px 20px;
    background:#00796b;
    color:white;
  }

  nav a {
    color:white;
    margin-left:15px;
    text-decoration:none;
    font-weight:bold;
  }

  main {
    padding:20px;
  }

  h2 { margin-bottom:20px; }

  .product-card {
    display:flex;
    align-items:center;
    background:white;
    margin-bottom:15px;
    padding:10px;
    border-radius:10px;
    box-shadow:0 3px 6px rgba(0,0,0,0.1);
  }

  .product-card img {
    width:60px; height:60px;
    border-radius:8px;
    margin-right:15px;
    object-fit:cover;
  }

  .remove-btn {
    margin-left:auto;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#c62828;
    color:white;
    cursor:pointer;
  }

  .remove-btn:hover { background:#b71c1c; transition:0.3s; }
</style>
</head>
<body>

<header>
  <h1>Shop Developer Mode</h1>
  <nav>
    <a href="home.html">Home</a>
    <a href="search.html">Search</a>
    <a href="profile.html">Profile</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<main>
  <h2>My Wishlist</h2>
  <div id="wishlistContainer" role="region" aria-label="Wishlist Products"></div>
</main>

<script>
  const wishlistContainer = document.getElementById('wishlistContainer');

  const allProducts = [
    {id:1, name:"Red Shirt", price:"₹499", img:"https://via.placeholder.com/60/ff0000"},
    {id:2, name:"Blue Jeans", price:"₹999", img:"https://via.placeholder.com/60/0000ff"},
    {id:3, name:"Green Hat", price:"₹299", img:"https://via.placeholder.com/60/00ff00"},
    {id:4, name:"Yellow Shoes", price:"₹799", img:"https://via.placeholder.com/60/ffff00"},
    {id:5, name:"Black Jacket", price:"₹1299", img:"https://via.placeholder.com/60/000000"}
  ];

  function renderWishlist(){
    wishlistContainer.innerHTML = "";
    const likedProducts = JSON.parse(localStorage.getItem('likedProducts') || '[]');
    if(likedProducts.length === 0){
      wishlistContainer.innerHTML = "<p>No liked products yet.</p>";
      return;
    }

    likedProducts.forEach(id=>{
      const product = allProducts.find(p=>p.id===id);
      if(product){
        const card = document.createElement('div');
        card.className = "product-card";
        card.innerHTML = `
          <img src="${product.img}" alt="${product.name}">
          <span>${product.name} - ${product.price}</span>
          <button class="remove-btn" onclick="removeFromWishlist(${product.id})">Remove</button>
        `;
        wishlistContainer.appendChild(card);
      }
    });
  }

  function removeFromWishlist(id){
    let likedProducts = JSON.parse(localStorage.getItem('likedProducts') || '[]');
    likedProducts = likedProducts.filter(pid => pid !== id);
    localStorage.setItem('likedProducts', JSON.stringify(likedProducts));
    renderWishlist();
  }

  renderWishlist();
</script>

</body>
</html>
