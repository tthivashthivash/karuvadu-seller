<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart & Checkout | Developer Mode</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f4f8; }
  header {
    display:flex; justify-content: space-between; align-items:center;
    padding:15px 20px; background:#00796b; color:white;
  }
  nav a { color:white; margin-left:15px; text-decoration:none; font-weight:bold; }
  main { padding:20px; }
  h2 { margin-bottom:20px; }
  .cart-item {
    display:flex; align-items:center; background:white; margin-bottom:15px;
    padding:10px; border-radius:10px; box-shadow:0 3px 6px rgba(0,0,0,0.1);
  }
  .cart-item img { width:60px; height:60px; border-radius:8px; margin-right:15px; object-fit:cover; }
  .remove-btn { margin-left:auto; padding:6px 10px; border:none; border-radius:6px; background:#c62828; color:white; cursor:pointer; }
  .remove-btn:hover { background:#b71c1c; transition:0.3s; }
  #checkoutForm { background:white; padding:20px; border-radius:10px; box-shadow:0 3px 6px rgba(0,0,0,0.1); margin-top:20px; }
  #checkoutForm input { width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ccc; }
  #checkoutForm button { padding:10px 15px; border:none; border-radius:6px; background:#00796b; color:white; cursor:pointer; }
  #checkoutForm button:hover { background:#004d40; transition:0.3s; }
</style>
</head>
<body>

<header>
  <h1>Shop Developer Mode</h1>
  <nav>
    <a href="home.html">Home</a>
    <a href="search.html">Search</a>
    <a href="wishlist.html">Wishlist</a>
    <a href="profile.html">Profile</a>
  </nav>
</header>

<main>
  <h2>My Cart</h2>
  <div id="cartContainer" role="region" aria-label="Cart Items"></div>

  <form id="checkoutForm" aria-label="Checkout Form">
    <h3>Checkout - Cash on Delivery</h3>
    <input type="text" id="name" placeholder="Your Name" required aria-required="true">
    <input type="text" id="address" placeholder="Delivery Address" required aria-required="true">
    <input type="tel" id="phone" placeholder="Phone Number" required aria-required="true">
    <button type="submit">Place Order</button>
  </form>
</main>

<script>
  const cartContainer = document.getElementById('cartContainer');
  const checkoutForm = document.getElementById('checkoutForm');

  function renderCart(){
    cartContainer.innerHTML = "";
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    if(cart.length===0){
      cartContainer.innerHTML = "<p>Your cart is empty.</p>";
      return;
    }
    cart.forEach(item=>{
      const div = document.createElement('div');
      div.className = "cart-item";
      div.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <span>${item.name} - ${item.price}</span>
        <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
      `;
      cartContainer.appendChild(div);
    });
  }

  function removeFromCart(id){
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart = cart.filter(item => item.id !== id);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }

  checkoutForm.addEventListener('submit', e=>{
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const address = document.getElementById('address').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if(!name || !address || !phone){
      alert("Please fill all fields!");
      return;
    }

    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    if(cart.length===0){
      alert("Cart is empty!");
      return;
    }

    // Store order in localStorage (simulate)
    const orders = JSON.parse(localStorage.getItem('orders') || '[]');
    orders.push({name, address, phone, items:cart, paymentMethod:"Cash on Delivery"});
    localStorage.setItem('orders', JSON.stringify(orders));

    // Clear cart
    localStorage.setItem('cart', '[]');
    renderCart();

    alert("Order placed successfully! 🎉");
    checkoutForm.reset();
  });

  renderCart();
</script>

</body>
</html>
