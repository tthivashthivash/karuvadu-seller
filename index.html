<!DOCTYPE html>
<html>
<head>
<title>Stylish Login & Signup</title>
<style>
*{box-sizing:border-box; font-family:sans-serif;}
body{
  margin:0; height:100vh; display:flex; justify-content:center; align-items:center;
  background: linear-gradient(270deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
  background-size:600% 600%; animation:bgmove 8s infinite alternate;
}
@keyframes bgmove{0%{background-position:0% 50%;}100%{background-position:100% 50%;}}

.container{
  width:380px; padding:40px; border-radius:20px; background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px); box-shadow:0 15px 40px rgba(0,0,0,0.3); text-align:center;
  transform:scale(0.8); animation:popup 1s forwards;
}
@keyframes popup{to{transform:scale(1);}}

h2{color:white; margin-bottom:20px;}
input{
  width:100%; padding:12px; margin-top:15px; border:none; border-radius:8px; outline:none;
}
button{
  margin-top:20px; width:100%; padding:12px; border:none; border-radius:8px;
  background:linear-gradient(135deg,#667eea,#764ba2); color:white; font-size:16px; cursor:pointer;
  transition:0.3s;
}
button:active{transform:scale(0.9);}
.switch-btn{
  margin-top:15px; background:none; color:white; text-decoration:underline; cursor:pointer;
}
</style>
</head>
<body>

<div class="container" id="loginBox">
  <h2>Login</h2>
  <input type="text" id="loginName" placeholder="Name">
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPass" placeholder="Password">
  <button onclick="login()">Login</button>
  <div><button class="switch-btn" onclick="showSignup()">Don't have an account? Sign Up</button></div>
</div>

<div class="container" id="signupBox" style="display:none;">
  <h2>Sign Up</h2>
  <input type="text" id="signupName" placeholder="Name">
  <input type="email" id="signupEmail" placeholder="Email">
  <input type="password" id="signupPass" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <div><button class="switch-btn" onclick="showLogin()">Already have an account? Login</button></div>
</div>

<script>
function showSignup(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("signupBox").style.display="block";
}
function showLogin(){
  document.getElementById("signupBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

function login(){
  // Dummy login
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPass").value;
  if(email && pass){
    alert("Login Success!");
    window.location.href="home.html"; // Redirect to Home Page
  }else{
    alert("Please enter your credentials!");
  }
}

function signup(){
  const email = document.getElementById("signupEmail").value;
  const pass = document.getElementById("signupPass").value;
  if(email && pass){
    alert("Signup Success!");
    window.location.href="home.html"; // Redirect to Home Page
  }else{
    alert("Please fill all fields!");
  }
}
</script>

</body>
</html>
