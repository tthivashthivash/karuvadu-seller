<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<style>
* { box-sizing: border-box; font-family: sans-serif; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#667eea,#764ba2);
}

.login-box {
  width: 350px;
  padding: 40px;
  border-radius: 15px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg,#f6d365,#fda085);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:active { transform: scale(0.95); }

h2 { color: white; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="login-box">
<h2>Login</h2>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>
function login(){
  alert("Login Success!");
  window.location.href = "home.html"; // ✅ Login success-ஆனா home page-க்கு போகும்
}
</script>

</body>
</html>
