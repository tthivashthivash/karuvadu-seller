<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login / Sign Up</title>
<style>
* { box-sizing: border-box; font-family: sans-serif; margin:0; padding:0; }
body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(270deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
  background-size:600% 600%;
  animation:bgmove 8s infinite alternate;
}

/* background animation */
@keyframes bgmove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

/* login/signup box */
.box{
  width:360px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  text-align:center;
  color:white;
  transform:scale(0.8);
  animation:popup 1s forwards;
}
@keyframes popup{ to{ transform:scale(1); } }

h2{ margin-bottom:20px; }

/* input */
input{
  width:100%;
  padding:12px;
  margin:12px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

/* buttons */
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:active{ transform:scale(0.95); }

/* toggle link */
.toggle-link{
  margin-top:12px;
  display:block;
  color:white;
  cursor:pointer;
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="box" id="loginBox">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>
<span class="toggle-link" onclick="showSignUp()">Don't have account? Sign Up</span>
</div>

<div class="box" id="signUpBox" style="display:none;">
<h2>Sign Up</h2>
<input type="text" id="signName" placeholder="Name">
<input type="email" id="signEmail" placeholder="Email">
<input type="password" id="signPassword" placeholder="Password">
<button onclick="signUp()">Sign Up</button>
<span class="toggle-link" onclick="showLogin()">Already have account? Login</span>
</div>

<script>
function showSignUp(){
  document.getElementById('loginBox').style.display='none';
  document.getElementById('signUpBox').style.display='block';
}
function showLogin(){
  document.getElementById('loginBox').style.display='block';
  document.getElementById('signUpBox').style.display='none';
}

function signUp(){
  const name = document.getElementById('signName').value;
  const email = document.getElementById('signEmail').value;
  const password = document.getElementById('signPassword').value;

  if(!name || !email || !password){ alert("Fill all fields!"); return; }

  let users = JSON.parse(localStorage.getItem('users') || '[]');
  users.push({name,email,password});
  localStorage.setItem('users', JSON.stringify(users));

  alert("Sign Up Successful! Please Login.");
  showLogin();
}

function login(){
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  let users = JSON.parse(localStorage.getItem('users') || '[]');

  let found = users.find(u => u.email===email && u.password===password);
  if(found){
    alert("Login Success!");
    window.location.href="home.html"; // redirect to Home page
  } else {
    alert("Invalid credentials!");
  }
}
</script>

</body>
</html>
