<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | Developer Mode</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0; padding:0;
    background: #f0f4f8;
  }

  header {
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding:15px 20px;
    background:#00796b;
    color:white;
  }

  header h1 { font-size:20px; }

  nav a {
    color:white;
    margin-left:15px;
    text-decoration:none;
    font-weight:bold;
  }

  main {
    padding:20px;
  }

  #searchBox {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:20px;
  }

  .products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
  }

  .product-card {
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .product-card img {
    width:100%;
    height:100px;
    object-fit:cover;
    border-radius:8px;
  }

  .product-card h3 {
    margin:10px 0 5px;
    font-size:16px;
    text-align:center;
  }

  .product-card p {
    margin:0;
    font-weight:bold;
    color:#00796b;
  }

  .product-card button {
    margin-top:10px;
    padding:8px 10px;
    border:none;
    border-radius:6px;
    background:#00796b;
    color:white;
    cursor:pointer;
  }

  .product-card button:hover { background:#004d40; transition:0.3s; }
</style>
</head>
<body>

<header>
  <h1>Shop Developer Mode</h1>
  <nav>
    <a href="#" id="profileLink">Profile</a>
    <a href="#" id="wishlistLink">Wishlist</a>
  </nav>
</header>

<main>
  <input type="text" id="searchBox" placeholder="Search products..." aria-label="Search Products">

  <div class="products" id="productList" role="list">
    <!-- Products will be populated here -->
  </div>
</main>

<script>
  const products = [
    {id:1,name:"Product 1",price:"$10",img:"https://via.placeholder.com/150"},
    {id:2,name:"Product 2",price:"$20",img:"https://via.placeholder.com/150"},
    {id:3,name:"Product 3",price:"$15",img:"https://via.placeholder.com/150"},
    {id:4,name:"Product 4",price:"$25",img:"https://via.placeholder.com/150"},
    {id:5,name:"Product 5",price:"$30",img:"https://via.placeholder.com/150"}
  ];

  const productList = document.getElementById('productList');

  function renderProducts(filter="") {
    productList.innerHTML = "";
    const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
    filtered.forEach(p=>{
      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('role','listitem');
      card.innerHTML = `
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>${p.price}</p>
        <button onclick="viewProduct(${p.id})">View Details</button>
      `;
      productList.appendChild(card);
    });
  }

  document.getElementById('searchBox').addEventListener('input', (e)=>{
    renderProducts(e.target.value);
  });

  function viewProduct(id) {
    // Developer-style: redirect to product details page
    window.location.href = 'product.html?id=' + id;
  }

  // Profile & Wishlist links
  document.getElementById('profileLink').onclick = ()=>window.location.href='profile.html';
  document.getElementById('wishlistLink').onclick = ()=>window.location.href='wishlist.html';

  renderProducts();
</script>

</body>
</html>
