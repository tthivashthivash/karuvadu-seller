<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details | Developer Mode</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0; padding:0;
    background:#f0f4f8;
  }

  header {
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding:15px 20px;
    background:#00796b;
    color:white;
  }

  nav a {
    color:white;
    margin-left:15px;
    text-decoration:none;
    font-weight:bold;
  }

  main {
    padding:20px;
  }

  .product-detail {
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 6px rgba(0,0,0,0.1);
    display:flex;
    gap:20px;
    align-items:center;
  }

  .product-detail img {
    width:150px; height:150px;
    border-radius:10px;
    object-fit:cover;
  }

  .product-info {
    flex:1;
  }

  .like-btn {
    font-size:24px;
    cursor:pointer;
    color:#ccc;
    transition: color 0.3s;
    user-select:none;
  }

  .like-btn.liked {
    color:red;
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.5); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<header>
  <h1>Shop Developer Mode</h1>
  <nav>
    <a href="home.html">Home</a>
    <a href="wishlist.html">Wishlist</a>
    <a href="profile.html">Profile</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<main>
  <h2>Product Details</h2>
  <div class="product-detail">
    <img id="productImg" src="https://via.placeholder.com/150/ff0000" alt="Red Shirt">
    <div class="product-info">
      <h3 id="productName">Red Shirt</h3>
      <p id="productPrice">₹499</p>
      <p id="productDesc">High-quality cotton shirt. Comfortable and stylish.</p>
      <span id="likeBtn" class="like-btn" role="button" aria-pressed="false" tabindex="0">❤</span>
      <button id="addToCartBtn" style="margin-left:15px; padding:6px 12px; border:none; border-radius:6px; background:#00796b; color:white; cursor:pointer;">Add to Cart</button>
    </div>
  </div>
</main>

<script>
  const likeBtn = document.getElementById('likeBtn');
  const addToCartBtn = document.getElementById('addToCartBtn');

  // Like / Heart functionality
  let likedProducts = JSON.parse(localStorage.getItem('likedProducts') || '[]');
  const productId = 1; // current product id

  function updateLikeState(){
    if(likedProducts.includes(productId)){
      likeBtn.classList.add('liked');
      likeBtn.setAttribute('aria-pressed','true');
    } else {
      likeBtn.classList.remove('liked');
      likeBtn.setAttribute('aria-pressed','false');
    }
  }

  likeBtn.addEventListener('click', ()=>{
    if(likedProducts.includes(productId)){
      likedProducts = likedProducts.filter(id => id !== productId);
    } else {
      likedProducts.push(productId);
    }
    localStorage.setItem('likedProducts', JSON.stringify(likedProducts));
    updateLikeState();
  });

  likeBtn.addEventListener('keypress', e=>{
    if(e.key === 'Enter') likeBtn.click();
  });

  updateLikeState();

  // Add to cart functionality
  addToCartBtn.addEventListener('click', ()=>{
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const product = {id:productId, name:"Red Shirt", price:"₹499", img:"https://via.placeholder.com/150/ff0000"};
    if(!cart.some(p=>p.id===productId)){
      cart.push(product);
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    alert(${product.name} added to cart!);
  });
</script>

</body>
</html>
