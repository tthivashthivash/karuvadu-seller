<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>
<style>
body{font-family:Arial; margin:0; padding:0; background:linear-gradient(120deg,#fef9f9,#e0f7fa); animation:gradientBG 15s ease infinite; background-size:400% 400%;}
.container{max-width:600px; margin:50px auto; background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2); text-align:center;}
.container img{width:100%; border-radius:15px; margin-bottom:20px; transition:0.3s;}
.container img:hover{transform:scale(1.05);}
.container h2{margin-bottom:15px; color:#333;}
.container p{margin-bottom:10px; color:#666; font-size:16px;}
.price{color:#ff4500; font-weight:bold; font-size:18px; margin-bottom:20px;}
button{padding:12px 25px; border:none; border-radius:10px; background:linear-gradient(135deg,violet,skyblue); color:white; font-size:16px; font-weight:bold; cursor:pointer; transition:0.3s;}
button:hover{transform:scale(1.05); box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.back-btn{margin-top:20px; display:inline-block; text-decoration:none; color:violet; transition:0.3s;}
.back-btn:hover{color:#4b0082;}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
</style>
</head>
<body>

<div class="container" id="product-container">
<!-- Product info populated by JS -->
</div>

<script>
// Redirect if not logged in
if(!localStorage.getItem('loggedIn')){
    alert("Please login first!");
    window.location.href="login.html";
}

// Load selected product
let product = JSON.parse(localStorage.getItem('selectedProduct'));
const container = document.getElementById('product-container');

if(product){
    container.innerHTML=`
    <img src="${product.img}" alt="${product.name}">
    <h2>${product.name}</h2>
    <p class="price">${product.price}</p>
    <p>${product.details}</p>
    <button onclick="buyProduct()">Buy Now</button>
    <a href="index.html" class="back-btn">← Back to Home</a>
    `;
}else{
    container.innerHTML=`<p>Product not found! <a href="index.html">Go back</a></p>`;
}

function buyProduct(){
    alert('Product added to cart!');
}
</script>
</body>
</html>
