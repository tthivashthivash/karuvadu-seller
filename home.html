<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - Mini Meesho</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}
body{background:linear-gradient(120deg,#fef9f9,#e0f7fa); animation:gradientBG 15s ease infinite; background-size:400% 400%; display:flex; justify-content:center; align-items:center; min-height:100vh;}
.product-container{background:white;padding:30px 25px;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,0.3);max-width:400px;width:90%;text-align:center;}
.product-container img{width:100%;border-radius:15px;margin-bottom:15px;transition:0.3s;}
.product-container img:hover{transform:scale(1.05);}
.product-container h2{color:#333;margin-bottom:10px;}
.product-container p{color:#666;margin-bottom:10px;}
.product-container .price{color:#ff4500;font-weight:bold;font-size:1.2rem;margin-bottom:15px;}
button{padding:12px 25px;border:none;border-radius:10px;margin:5px;cursor:pointer;font-weight:bold;font-size:16px;transition:0.3s;}
#buy-btn{background:linear-gradient(135deg,violet,skyblue);color:white;}
#buy-btn:hover{transform:scale(1.05);box-shadow:0 5px 15px rgba(0,0,0,0.2);}
#back-btn{background:#ddd;color:#333;}
#back-btn:hover{transform:scale(1.05);box-shadow:0 5px 15px rgba(0,0,0,0.2);}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
</style>
</head>
<body>

<div class="product-container">
<img id="prod-img" src="" alt="Product">
<h2 id="prod-name"></h2>
<p class="price" id="prod-price"></p>
<p id="prod-details"></p>
<button id="buy-btn">Buy Now</button>
<button id="back-btn">Back</button>
</div>

<script>
// Redirect if not logged in
if(!localStorage.getItem('loggedIn')){
    alert("Please login first!");
    window.location.href="login.html";
}

// Get selected product from localStorage
const prod = JSON.parse(localStorage.getItem('selectedProduct'));
if(!prod){
    alert("No product selected!");
    window.location.href="index.html";
}

// Display product details
document.getElementById('prod-img').src = prod.img;
document.getElementById('prod-name').innerText = prod.name;
document.getElementById('prod-price').innerText = prod.price;
document.getElementById('prod-details').innerText = prod.details;

// Buy button click
document.getElementById('buy-btn').addEventListener('click', ()=>{
    alert(`You bought "${prod.name}" for ${prod.price}!`);
    // Optional: Add to cart logic here
});

// Back button click
document.getElementById('back-btn').addEventListener('click', ()=>{
    window.location.href='index.html';
});
</script>

</body>
</html>
