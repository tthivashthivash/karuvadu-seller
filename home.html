<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Stylish Home</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(270deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
  background-size: 600% 600%;
  animation: bgmove 12s infinite alternate;
}

@keyframes bgmove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

header {
  padding: 25px;
  text-align: center;
  color: white;
  font-size: 32px;
  letter-spacing: 2px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* Search Bar */
.search-bar {
  display: flex;
  justify-content: center;
  margin: 20px;
}
.search-bar input {
  width: 60%;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  backdrop-filter: blur(5px);
  background: rgba(255,255,255,0.25);
  color: white;
  transition: 0.3s;
}
.search-bar input:focus {
  background: rgba(255,255,255,0.4);
  transform: scale(1.02);
  box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

/* Product Grid */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 30px;
  padding: 20px 40px;
}

.product-box {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  transform: translateY(20px);
  opacity: 0;
  animation: fadeInUp 0.8s forwards;
}

.product-box:nth-child(1) { animation-delay: 0.1s; }
.product-box:nth-child(2) { animation-delay: 0.3s; }
.product-box:nth-child(3) { animation-delay: 0.5s; }
.product-box:nth-child(4) { animation-delay: 0.7s; }

.product-box img {
  width: 80px;
  height: 80px;
  margin-bottom: 12px;
  border-radius: 12px;
  transition: transform 0.3s;
}
.product-box:hover img {
  transform: scale(1.1) rotate(5deg);
}

.product-box h3 {
  margin-bottom: 6px;
  font-size: 18px;
}

.product-box p {
  font-size: 16px;
  font-weight: bold;
}

/* Animation */
@keyframes fadeInUp {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-around;
  padding: 15px 0;
  font-size: 26px;
  color: white;
  box-shadow: 0 -2px 20px rgba(0,0,0,0.2);
}
.bottom-nav div:hover {
  transform: scale(1.2);
  transition: 0.3s;
}
</style>
</head>
<body>

<header>My Stylish Shop</header>

<div class="search-bar">
  <input type="text" placeholder="Search products...">
</div>

<div class="container">
  <div class="product-box">
    <img src="https://via.placeholder.com/80" alt="Product 1">
    <h3>Product 1</h3>
    <p>$19.99</p>
  </div>
  <div class="product-box">
    <img src="https://via.placeholder.com/80" alt="Product 2">
    <h3>Product 2</h3>
    <p>$29.99</p>
  </div>
  <div class="product-box">
    <img src="https://via.placeholder.com/80" alt="Product 3">
    <h3>Product 3</h3>
    <p>$39.99</p>
  </div>
  <div class="product-box">
    <img src="https://via.placeholder.com/80" alt="Product 4">
    <h3>Product 4</h3>
    <p>$24.99</p>
  </div>
  <div class="product-box">
    <img src="https://via.placeholder.com/80" alt="Product 5">
    <h3>Product 5</h3>
    <p>$34.99</p>
  </div>
  <div class="product-box">
    <img src="https://via.placeholder.com/80" alt="Product 6">
    <h3>Product 6</h3>
    <p>$44.99</p>
  </div>
</div>

<div class="bottom-nav">
  <div>🏠</div>
  <div>📦</div>
  <div>❤️</div>
  <div>👤</div>
</div>

</body>
</html>
