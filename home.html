<!DOCTYPE html>
<html>
<head>
<title>My Online Shop</title>
<style>
*{box-sizing:border-box; font-family:sans-serif;}
body{
  margin:0; background: linear-gradient(135deg,#1f1c2c,#928dab); color:white;
  display:flex; flex-direction:column; min-height:100vh;
}
/* Header */
.header{
  padding:20px; font-size:24px; text-align:center; letter-spacing:2px; font-weight:bold;
}
/* Search box */
.search-box{
  margin:10px auto; width:90%; max-width:400px; display:flex;
}
.search-box input{
  flex:1; padding:10px 15px; border-radius:10px 0 0 10px; border:none; outline:none;
}
.search-box button{
  padding:10px 15px; border:none; border-radius:0 10px 10px 0; background:#764ba2; color:white; cursor:pointer;
  transition:0.3s;
}
.search-box button:active{transform:scale(0.95);}

/* Products grid */
.products{
  display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px;
  flex:1;
}
.product-card{
  width:220px; height:280px; background:rgba(255,255,255,0.15); border-radius:20px;
  backdrop-filter:blur(10px); box-shadow:0 8px 30px rgba(0,0,0,0.3);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:0.4s; text-align:center;
}
.product-card:hover{transform:scale(1.05);}
.product-card img{
  width:120px; height:120px; border-radius:15px; object-fit:cover; margin-bottom:15px;
}
.product-card h3{margin:0 0 10px 0;}
.product-card p{margin:0 0 15px 0;}
.product-card button{
  padding:8px 15px; border:none; border-radius:10px; background:white; color:black; cursor:pointer;
}

/* Bottom navigation */
.bottom-nav{
  position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around;
  background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); padding:14px; font-size:20px;
}
.bottom-nav div{cursor:pointer; transition:0.3s;}
.bottom-nav div:active{transform:scale(0.9);}
</style>
</head>
<body>

<div class="header">My Online Shop</div>

<div class="search-box">
  <input type="text" placeholder="Search Products...">
  <button>🔍</button>
</div>

<div class="products">
  <div class="product-card">
    <img src="https://via.placeholder.com/120" alt="Product 1">
    <h3>Product 1</h3>
    <p>$10</p>
    <button>Add to Cart</button>
  </div>
  <div class="product-card">
    <img src="https://via.placeholder.com/120" alt="Product 2">
    <h3>Product 2</h3>
    <p>$20</p>
    <button>Add to Cart</button>
  </div>
  <div class="product-card">
    <img src="https://via.placeholder.com/120" alt="Product 3">
    <h3>Product 3</h3>
    <p>$15</p>
    <button>Add to Cart</button>
  </div>
</div>

<div class="bottom-nav">
  <div>🏠</div>
  <div>📦</div>
  <div>❤️</div>
  <div>👤</div>
</div>

</body>
</html>
