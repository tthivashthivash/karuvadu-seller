<!DOCTYPE html>
<html>
<head>
<title>Home Page</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#fbc2eb,#a6c1ee);
}

/* header */
.header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  color: white;
  letter-spacing: 2px;
}

/* product section */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 70vh;
}

.product-box {
  width: 300px;
  height: 200px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  transition: 0.3s;
}

.product-box:hover {
  transform: scale(1.05);
}

/* button */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: white;
  color: black;
  cursor: pointer;
}

/* bottom icons */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 14px;
  font-size: 22px;
  color: white;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(8px);
}
</style>
</head>
<body>

<div class="header">My Online Shop</div>

<div class="container">
  <div class="product-box">
    <h2>Welcome!</h2>
    <p>Your Products Will Appear Here</p>
    <button>Add Product</button>
  </div>
</div>

<div class="bottom-nav">
  <div>🏠</div>
  <div>📦</div>
  <div>❤️</div>
  <div>👤</div>
</div>

</body>
</html>
