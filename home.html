<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Meesho Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}
body{background:linear-gradient(120deg,#fef9f9,#e0f7fa); animation:gradientBG 15s ease infinite; background-size:400% 400%; transition:0.5s;}
header{display:flex; justify-content:space-between; align-items:center; padding:20px 40px; background:linear-gradient(135deg,violet,skyblue); color:white; flex-wrap:wrap;}
header h1{font-size:1.8rem;}
header a{color:white; text-decoration:none; font-weight:bold; transition:0.3s;}
header a:hover{transform:scale(1.05);}
.search-bar{width:100%; max-width:400px; margin:20px auto; display:flex; justify-content:center;}
.search-bar input{width:100%; padding:10px 15px; border-radius:25px; border:2px solid #ddd; outline:none; font-size:16px; transition:0.3s;}
.search-bar input:focus{border-color:violet;}
.categories{display:flex; justify-content:center; gap:20px; margin:15px 0; flex-wrap:wrap;}
.categories div{background:white; padding:10px 15px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.15); cursor:pointer; transition:0.3s;}
.categories div:hover{transform:scale(1.05);}
main{display:flex; flex-wrap:wrap; justify-content:center; gap:25px; padding:20px;}
.product-card{background:white; width:220px; border-radius:15px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,0.15); text-align:center; transition:0.3s; cursor:pointer;}
.product-card:hover{transform:translateY(-10px) scale(1.05); box-shadow:0 12px 25px rgba(0,0,0,0.25);}
.product-card img{width:100%; height:160px; object-fit:cover; transition:0.3s;}
.product-card img:hover{transform:scale(1.1);}
.product-info{padding:15px;}
.product-info h3{color:#333; margin-bottom:8px;}
.product-info p{color:#666; font-size:0.95rem; margin-bottom:6px;}
.product-info .price{color:#ff4500; font-weight:bold;}
@media(max-width:600px){main{gap:20px;} .product-card{width:100%; max-width:300px;} header{flex-direction:column; gap:10px; text-align:center;}}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
</style>
</head>
<body>
<header>
<h1>Mini Meesho</h1>
<a href="admin.html">Admin</a>
</header>

<!-- Search -->
<div class="search-bar">
<input type="text" id="search-input" placeholder="Search products...">
</div>

<!-- Categories / Icons Row -->
<div class="categories">
<div>Trending</div>
<div>New Arrivals</div>
<div>Top Picks</div>
<div>Clothing</div>
<div>Accessories</div>
</div>

<!-- Products -->
<main id="product-list"></main>

<script>
// Redirect if not logged in
if(!localStorage.getItem('loggedIn')){
    alert("Please login first!");
    window.location.href="login.html";
}

// Product data
let products = JSON.parse(localStorage.getItem('products')) || [
    {name:"Product 1", price:"₹500", details:"Awesome product 1", img:"images/product1.jpg"},
    {name:"Product 2", price:"₹800", details:"Awesome product 2", img:"images/product2.jpg"},
    {name:"Product 3", price:"₹1200", details:"Awesome product 3", img:"images/product3.jpg"}
];

// Render products
function renderProducts(list){
    const container = document.getElementById('product-list');
    container.innerHTML='';
    list.forEach((prod,index)=>{
        const card=document.createElement('div');
        card.className='product-card';
        card.innerHTML=`<img src="${prod.img}" alt="${prod.name}"><div class="product-info"><h3>${prod.name}</h3><p class="price">${prod.price}</p><p>${prod.details}</p></div>`;
        card.addEventListener('click',()=>{
            localStorage.setItem('selectedProduct', JSON.stringify({...prod,index}));
            window.location.href='product.html';
        });
        container.appendChild(card);
    });
}

// Initial render
renderProducts(products);

// Search filter
document.getElementById('search-input').addEventListener('input',(e)=>{
    const val = e.target.value.toLowerCase();
    const filtered = products.filter(p=>p.name.toLowerCase().includes(val) || p.details.toLowerCase().includes(val));
    renderProducts(filtered);
});
</script>
</body>
</html>
